<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>FoodScan - Analizzatore prodotti</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>FoodScan</h1>
    <p class="subtitle">Analizza prodotti alimentari tramite API OpenFoodFacts</p>
  </header>

  <main>

    <!-- COLONNA SINISTRA -->
    <section class="left-panel">

      <!-- CERCA PRODOTTO -->
      <div class="card">
        <h2>Cerca prodotto</h2>

        <form id="barcode-form">
          <label for="barcode-input">Codice a barre</label>
          <div class="input-row">
            <input type="text" id="barcode-input" placeholder="Es. 5449000000996" required>
            <button type="submit" class="btn primary">Cerca</button>
          </div>
        </form>

        <div id="message"></div>
      </div>

      <!-- STORICO -->
      <div class="card">
        <h2>Storico ricerche</h2>
        <ul id="history-list" class="history-list"></ul>
      </div>

      <!-- PREFERENZE -->
      <div class="card">
        <h2>Preferenze utente</h2>

        <label><input type="checkbox" id="pref-low-sugar"> Evita zuccheri alti</label><br>
        <label><input type="checkbox" id="pref-low-satfat"> Evita grassi saturi</label><br>
        <label><input type="checkbox" id="pref-low-salt"> Evita sale alto</label><br>
        <label><input type="checkbox" id="pref-no-additives"> Evita molti additivi</label>
      </div>

    </section>

    <!-- COLONNA DESTRA -->
    <section class="right-panel">

      <!-- SCHEDA PRODOTTO -->
      <div id="product-card" class="card hidden">
        <h2 id="product-name"></h2>

        <img id="product-image" alt="Immagine prodotto">

        <p><strong>Marca:</strong> <span id="product-brand"></span></p>
        <p><strong>Categoria:</strong> <span id="product-category"></span></p>

        <p>
          <strong>NutriScore:</strong>
          <span id="product-nutriscore" class="nutriscore-badge"></span>
        </p>

        <p><strong>Allergeni:</strong> <span id="product-allergens"></span></p>
      </div>

      <!-- PUNTEGGIO SALUTE -->
      <div id="health-score-section" class="card hidden">
        <h2>Punteggio Salute</h2>

        <div class="health-bar-container">
          <div id="health-bar" class="health-bar"></div>
        </div>

        <p id="health-score-text"></p>

        <h3>Consigli personalizzati</h3>
        <ul id="health-advice-list"></ul>
      </div>

    </section>

  </main>

  <footer>
    <p>Progetto scolastico - FoodScan</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
