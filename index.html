<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>FoodScan - Analizzatore prodotti</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h1>FoodScan</h1>
    <p class="subtitle">Analizza prodotti alimentari tramite API OpenFoodFacts</p>
  </header>

  <main>
    <section class="left-panel">
      <div class="card">
        <h2>Cerca prodotto</h2>

        <form id="barcode-form">
          <label for="barcode-input">Codice a barre</label>
          <div class="input-row">
            <input type="text" id="barcode-input" placeholder="Es. 5449000000996" required>
            <button type="submit" class="btn primary">Cerca</button>
          </div>
        </form>

        <div id="message"></div>
      </div>

      <div class="card">
        <h2>Storico ricerche</h2>
        <ul id="history-list" class="history-list"></ul>
      </div>
    </section>

    <section class="right-panel">
      <div id="product-card" class="card hidden">
        <h2 id="product-name"></h2>
        <img id="product-image" alt="Immagine prodotto">

        <p><strong>Marca:</strong> <span id="product-brand"></span></p>
        <p><strong>Categoria:</strong> <span id="product-category"></span></p>

        <p>
          <strong>NutriScore:</strong>
          <span id="product-nutriscore" class="nutriscore-badge"></span>
        </p>

        <p><strong>Allergeni:</strong> <span id="product-allergens"></span></p>
      </div>
    </section>
  </main>

  <footer>
    <p>Progetto scolastico - FoodScan</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
